apiVersion: v1                      # Service는 core/v1 API 그룹에 속합니다
kind: Service                       # 리소스 종류는 Service입니다 (네트워크 접근 지점)
metadata:
  name: demo-service               # Service의 이름입니다 (kubectl로 조회하거나 참조할 때 사용)
spec:
  selector:
    app: demo                      # 이 라벨을 가진 Pod에 트래픽을 전달합니다
  ports:
    - protocol: TCP                # 사용하는 전송 프로토콜입니다 (일반 웹은 TCP 사용)
      port: 80                     # 클라이언트가 접근할 Service 포트입니다
      targetPort: 3000             # 실제 Pod 내 컨테이너가 열고 있는 포트입니다
  type: NodePort                   # 클러스터 외부에서도 접근 가능하도록 NodePort 방식 사용